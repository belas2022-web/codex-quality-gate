name: release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install build
      - run: python -m build
      - run: sha256sum dist/* > dist/SHA256SUMS
      - run: echo "sign dist artifacts with offline Ed25519 release key"
      - run: echo "never publish unsigned artifact as stable"
