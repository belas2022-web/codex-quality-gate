      },
      "pattern": "verify_hash = False"
    },
    {
      "id": "cqg.updater.http-url",
      "languages": [
        "python"
      ],
      "message": "Updater URL must use HTTPS.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "update_url = \"http://...\""
    },
    {
      "id": "cqg.updater.auto-execute",
      "languages": [
        "python"
      ],
      "message": "Downloaded artifacts must not be executed.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "patterns": [
        {
          "pattern-either": [
            {
              "pattern": "subprocess.run($ARTIFACT, ...)"
            },
            {
              "pattern": "os.startfile($ARTIFACT)"
            },
            {
              "pattern": "webbrowser.open($ARTIFACT)"
            }
          ]
        },
        {
          "metavariable-regex": {
            "metavariable": "$ARTIFACT",
            "regex": "(?i).*(download|artifact|payload|installer|update_file|app_file|binary).*"
          }
        }
      ]
    },
    {
      "id": "cqg.updater.no-rollback",
      "languages": [
        "python"
      ],
      "message": "Updater rollback is disabled.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "rollback = False"
    },
    {
      "id": "cqg.updater.no-lock",
      "languages": [
        "python"
      ],
      "message": "Updater lock is disabled.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "update_lock = False"
    },
    {
      "id": "cqg.updater.no-timeout",
      "languages": [
        "python"
      ],
      "message": "Updater request requires timeout.",
      "severity": "WARNING",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "patterns": [
        {
          "pattern": "requests.get($URL, ...)"
        },
        {
          "pattern-not": "requests.get($URL, ..., timeout=$TIMEOUT, ...)"
        }
      ]
    },
    {
      "id": "cqg.updater.version-string-compare",
      "languages": [
        "python"
      ],
      "message": "Use packaging.version.Version comparisons.",
      "severity": "WARNING",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "remote_version > local_version"
    },
    {
      "id": "cqg.chat.ui-scraping",
