{
  "rules": [
    {
      "id": "cqg.python.eval",
      "languages": [
        "python"
      ],
      "message": "Dynamic eval executes arbitrary code.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "eval(...)"
    },
    {
      "id": "cqg.python.exec",
      "languages": [
        "python"
      ],
      "message": "Dynamic exec executes arbitrary code.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "exec(...)"
    },
    {
      "id": "cqg.python.shell-true",
      "languages": [
        "python"
      ],
      "message": "subprocess shell=True enables command injection.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "subprocess.$F(..., shell=True, ...)"
    },
    {
      "id": "cqg.python.pickle-loads",
      "languages": [
        "python"
      ],
      "message": "Pickle deserialization can execute code.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "pickle.loads(...)"
    },
    {
      "id": "cqg.python.yaml-load",
      "languages": [
        "python"
      ],
      "message": "Use yaml.safe_load or SafeLoader.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "yaml.load(...)"
    },
    {
      "id": "cqg.python.verify-false",
      "languages": [
        "python"
      ],
      "message": "TLS verification is disabled.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "$HTTP.$METHOD(..., verify=False, ...)"
    },
    {
      "id": "cqg.python.requests-no-timeout",
      "languages": [
        "python"
      ],
      "message": "Review requests calls for explicit timeout.",
      "severity": "WARNING",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "patterns": [
        {
          "pattern-either": [
            {
              "patterns": [
                {
                  "pattern": "requests.get(...)"
                },
                {
                  "pattern-not": "requests.get(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern": "requests.post(...)"
                },
                {
                  "pattern-not": "requests.post(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern": "requests.put(...)"
                },
                {
                  "pattern-not": "requests.put(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern": "requests.delete(...)"
                },
                {
                  "pattern-not": "requests.delete(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern-inside": "$SESSION = requests.Session()\n..."
                },
                {
                  "pattern": "$SESSION.get(...)"
                },
                {
                  "pattern-not": "$SESSION.get(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern-inside": "$SESSION = requests.Session()\n..."
                },
                {
                  "pattern": "$SESSION.post(...)"
                },
                {
                  "pattern-not": "$SESSION.post(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern-inside": "$SESSION = requests.Session()\n..."
                },
                {
                  "pattern": "$SESSION.put(...)"
                },
                {
                  "pattern-not": "$SESSION.put(..., timeout=$TIMEOUT, ...)"
                }
              ]
            },
            {
              "patterns": [
                {
                  "pattern-inside": "$SESSION = requests.Session()\n..."
                },
                {
                  "pattern": "$SESSION.delete(...)"
                },
                {
                  "pattern-not": "$SESSION.delete(..., timeout=$TIMEOUT, ...)"
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "id": "cqg.python.sql-fstring",
      "languages": [
        "python"
      ],
      "message": "SQL f-string requires parameterization.",
      "severity": "ERROR",
      "metadata": {
        "source": "codex-quality-gate"
      },
      "pattern": "$DB.execute(f\"...\")"
    },
    {
